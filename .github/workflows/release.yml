name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Stash GoReleaser config
        run: cp .goreleaser.yaml /tmp/.goreleaser.yaml

      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([.-][A-Za-z0-9._-]+)?$ ]]; then
            echo "::error::Invalid release tag: $RELEASE_TAG"
            exit 2
          fi
          git checkout -- "$RELEASE_TAG"

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean --config /tmp/.goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew-tap:
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Resolve release tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            release_tag="$INPUT_TAG"
          else
            release_tag="$REF_NAME"
          fi
          if [[ ! "$release_tag" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([.-][A-Za-z0-9._-]+)?$ ]]; then
            echo "::error::Invalid release tag: $release_tag"
            exit 2
          fi
          printf 'RELEASE_TAG=%s\n' "$release_tag" >> "$GITHUB_ENV"

      - name: Dispatch tap formula update
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::Set HOMEBREW_TAP_TOKEN with workflow access to openclaw/homebrew-tap"
            exit 1
          fi

          request_id="gitcrawl-${RELEASE_TAG}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          expected_title="Update gitcrawl for ${RELEASE_TAG} (${request_id})"

          gh workflow run update-formula.yml \
            --repo openclaw/homebrew-tap \
            --ref main \
            -f formula=gitcrawl \
            -f tag="$RELEASE_TAG" \
            -f repository=openclaw/gitcrawl \
            -f artifact_template="{formula}_{version}_{target}.tar.gz" \
            -f request_id="$request_id"

          run_id=""
          for _ in {1..30}; do
            run_id=$(gh run list \
              --repo openclaw/homebrew-tap \
              --workflow update-formula.yml \
              --branch main \
              --event workflow_dispatch \
              --limit 20 \
              --json databaseId,displayTitle |
              jq -r --arg title "$expected_title" '.[] | select(.displayTitle == $title) | .databaseId' |
              head -n1)
            if [ -n "$run_id" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$run_id" ]; then
            echo "::error::Could not find tap workflow run with title: $expected_title"
            exit 1
          fi

          gh run watch "$run_id" \
            --repo openclaw/homebrew-tap \
            --exit-status \
            --interval 10
