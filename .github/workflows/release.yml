name: release validation

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to validate (e.g. v0.7.1)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  goreleaser-snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Stash release tooling
        shell: bash
        run: |
          set -euo pipefail
          cp scripts/codesign-macos.sh /tmp/gitcrawl-codesign-macos.sh
          sed 's#./scripts/codesign-macos.sh#/tmp/gitcrawl-codesign-macos.sh#' \
            .goreleaser.yaml > /tmp/.goreleaser.yaml
          chmod +x /tmp/gitcrawl-codesign-macos.sh

      - name: Checkout release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([.-][A-Za-z0-9._-]+)?$ ]]; then
            echo "::error::Invalid release tag: $RELEASE_TAG"
            exit 2
          fi
          git checkout --detach "$RELEASE_TAG"

      - name: Snapshot release
        uses: goreleaser/goreleaser-action@v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --snapshot --clean --skip=publish --config /tmp/.goreleaser.yaml
