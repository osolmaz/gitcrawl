name: Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Draft or published release tag to verify"
        required: true
        type: string

permissions:
  # GitHub hides draft releases from the workflow token without write visibility.
  # This workflow only issues authenticated GET requests and never publishes.
  contents: write

jobs:
  verify-macos-assets:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
       endsWith(github.workflow_ref, format('@refs/heads/{0}', github.event.repository.default_branch))) ||
      (github.event_name == 'release' && github.event.action == 'published')
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-15
            arch: arm64
          - runs-on: macos-15-intel
            arch: amd64
    runs-on: ${{ matrix.runs-on }}
    env:
      RELEASE_TAG: ${{ inputs.tag || github.event.release.tag_name }}
      EXPECTED_DRAFT: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Download release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+[.][0-9]+[.][0-9]+([.-][A-Za-z0-9._-]+)?$ ]]; then
            echo "::error::Invalid release tag: $RELEASE_TAG"
            exit 2
          fi
          mkdir -p artifacts
          version="${RELEASE_TAG#v}"
          release_id=$(gh api --method GET "repos/$GITHUB_REPOSITORY/releases?per_page=100" | \
            jq -r --arg tag "$RELEASE_TAG" --arg draft "$EXPECTED_DRAFT" \
              '[.[] | select(.tag_name == $tag and (.draft == ($draft == "true")))] | if length == 1 then .[0].id else empty end')
          [[ -n "$release_id" ]] || {
            echo "::error::Expected exactly one release for $RELEASE_TAG with draft=$EXPECTED_DRAFT"
            exit 1
          }
          assets=$(gh api --method GET "repos/$GITHUB_REPOSITORY/releases/$release_id/assets?per_page=100")
          expected_assets=$(printf '%s\n' \
            checksums.txt \
            "gitcrawl_${version}_darwin_amd64.tar.gz" \
            "gitcrawl_${version}_darwin_arm64.tar.gz" \
            "gitcrawl_${version}_linux_amd64.tar.gz" \
            "gitcrawl_${version}_linux_arm64.tar.gz" \
            "gitcrawl_${version}_windows_amd64.zip" \
            "gitcrawl_${version}_windows_arm64.zip" | LC_ALL=C sort)
          actual_assets=$(jq -r '.[].name' <<<"$assets" | LC_ALL=C sort)
          [[ "$actual_assets" == "$expected_assets" ]] || {
            echo "::error::Unexpected release asset inventory"
            diff -u <(printf '%s\n' "$expected_assets") <(printf '%s\n' "$actual_assets") || true
            exit 1
          }
          for name in "gitcrawl_${version}_darwin_${{ matrix.arch }}.tar.gz" checksums.txt; do
            asset_id=$(jq -r --arg name "$name" \
              '[.[] | select(.name == $name)] | if length == 1 then .[0].id else empty end' <<<"$assets")
            [[ -n "$asset_id" ]] || {
              echo "::error::Expected exactly one release asset named $name"
              exit 1
            }
            asset_url=$(jq -r --arg name "$name" '.[] | select(.name == $name) | .url' <<<"$assets")
            expected_url="https://api.github.com/repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
            [[ "$asset_url" == "$expected_url" ]] || {
              echo "::error::Unexpected API URL for $name"
              exit 1
            }
            gh api --method GET -H "Accept: application/octet-stream" "$asset_url" >"artifacts/$name"
          done

      - name: Verify Developer ID signature
        shell: bash
        run: |
          unset GH_TOKEN GITHUB_TOKEN
          ./scripts/verify-release.sh "$RELEASE_TAG" artifacts "${{ matrix.arch }}"
